<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leopard Twitch Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #0f0e13;
      font-family: 'Outfit', sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-grow: 1;
      color: #9a98a6;
      gap: 16px;
      transition: opacity 0.3s ease;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(145, 70, 255, 0.1);
      border-left-color: #9146ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    iframe {
      border: none;
      width: 100%;
      height: 100%;
      display: none;
    }
  </style>
</head>
<body>
  <div id="loading-container">
    <div class="spinner"></div>
    <span id="loading-text">Loading Leopard Chat...</span>
  </div>
  <iframe id="chat-iframe" sandbox="allow-storage-access-by-user-activation allow-scripts allow-same-origin allow-popups"></iframe>
  <script src="sidepanel.js"></script>
</body>
</html>
